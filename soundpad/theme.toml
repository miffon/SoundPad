panel_missing = "#3a3026"
input = "#2b3038"
menu = "#2b3038"
dialog = "#20242b"
border = "#4d5664"
border_muted = "#3b424d"
accent = "#67d5b5"
accent_muted = "#3f695d"
selection = "#465161"
drag_hover_border = "#6ee7ff"

[button.default]
normal = "#39414d"
hover = "#465161"
pressed = "#303846"
