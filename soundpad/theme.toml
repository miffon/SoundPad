[text]
primary = "#edf0f4"
secondary = "#aab2bf"
strong = "#ffffff"
warning = "#ffca58"

[surface]
window = "#20242b"
panel = "#2b3038"
panel_pressed = "#20262f"
panel_empty = "#262b33"
