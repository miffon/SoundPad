# Windows 專用：用 pywinstyles 調整系統 title bar；macOS/Linux 會忽略。
[platform.windows_title_bar]
enabled = true
style = "dark"
header_color = "#20242b"
title_color = "#edf0f4"
border_color = "#3b424d"

[waveform]
background = "#16181d"
empty_text = "#7f8794"
wave = "#67d5b5"
selection = "#ffffff"
selection_alpha = 34
fade_region = "#ffca58"
fade_region_alpha = 50
fade_slope = "#ffffff"
handle = "#ffca58"
fade_handle = "#f08f5f"
knob_border = "#20242b"
zoom_text = "#aab2bf"
playhead = "#6ee7ff"
db_line = "#edf0f4"
db_line_alpha = 72
db_label = "#aab2bf"
